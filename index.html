<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Great Oldbury Yard Trail</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f4f4;
}

header{
  background:#2e7d32;
  color:white;
  text-align:center;
  padding:20px;
}

#counter{
  text-align:center;
  font-size:28px;
  font-weight:bold;
  padding:20px;
}

#map{
  height:75vh;
}

</style>
</head>

<body>

<header>
<h1>🏡 Great Oldbury Yard Trail</h1>
<p>Saturday 29 August 2026 • 10am–3pm</p>
</header>

<div id="counter">Loading stalls...</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([51.742,-2.280],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19,
attribution:'© OpenStreetMap contributors'
}).addTo(map);

fetch("stalls.json")
.then(r=>r.json())
.then(stalls=>{

document.getElementById("counter").innerHTML =
"🏡 "+stalls.length+" Stalls Confirmed";const locations = {
  "15 Daniels Way": [51.7419, -2.2798],
  "23 Great Oldbury Drive": [51.7428, -2.2778],
  "7 Westfield": [51.7440, -2.2818],
  "33 Arthur Keene Close": [51.7424, -2.2809]
};

stalls.forEach(stall => {

  const coords = locations[stall.address];

  if(coords){

    L.marker(coords)
      .addTo(map)
      .bindPopup("<strong>"+stall.address+"</strong>");

  }

});

})
.catch(error=>{

document.getElementById("counter").innerHTML="Unable to load stalls.";

});

</script>

</body>
</html>
